<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dataset Reviewer — find ML & NLP datasets by meaning</title>
    <meta name="description" content="Search newly-proposed machine-learning and NLP datasets and benchmarks by meaning. Updated daily. Runs entirely in your browser." />
    <script>
      // Shared misclaw theme: a cookie scoped to .misclaw.app keeps the
      // light/dark choice in sync across every *.misclaw.app site; localStorage
      // is the same-origin fallback (local dev). Read before paint to avoid a flash.
      (function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)mc-theme=(light|dark)\b/);
          var t = m ? m[1] : (localStorage.getItem("theme") || localStorage.getItem("refmap-theme"));
          if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <!-- Google Analytics (GA4) — production *.misclaw.app only -->
    <script>
      (function () {
        var h = location.hostname;
        if (h !== "misclaw.app" && !h.endsWith(".misclaw.app")) return;
        var id = "G-RS1NQQW0VS";
        var s = document.createElement("script"); s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + id;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); } window.gtag = gtag;
        gtag("js", new Date()); gtag("config", id);
      })();
    </script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <h1>Dataset Reviewer</h1>
        <p class="tagline">Newly-proposed ML &amp; NLP datasets &amp; benchmarks — searchable by meaning, updated daily.</p>
      </div>
      <nav class="header-nav">
        <button id="theme-toggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
        <a class="home-link" href="https://misclaw.app">misclaw ↗</a>
      </nav>
    </header>
    <main id="app" class="app"></main>
    <footer class="site-footer">
      <span>No server, no accounts — search runs in your browser over shipped embeddings.</span>
      <a href="https://github.com/misclaw/dataset-reviewer">source</a>
    </footer>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
